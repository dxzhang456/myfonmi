plugins {
    id 'com.android.library'
}

android {
    namespace 'com.whl.quickjs.android'
    compileSdk 34

    defaultConfig {
        minSdk 18
        targetSdk 28
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
        debug {
            minifyEnabled false
            debuggable true
            jniDebuggable true
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
}

dependencies {
    
}
